<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="theme-color" content="#ffffff"/>
<title>RD Expense</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f1;--sf:#ffffff;--s2:#f0ede8;
  --bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.16);
  --tx:#1a1917;--tx2:#6b6860;--tx3:#a09e99;
  --g:#1D9E75;--gbg:#e1f5ee;--gdk:#0F6E56;
  --bl:#185FA5;--blbg:#E6F1FB;
  --am:#BA7517;--ambg:#FAEEDA;--amdk:#854F0B;
  --rd:#A32D2D;--rdbg:#FCEBEB;
  --r:12px;--rsm:7px;
  --sh:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.05);
  --shlg:0 8px 40px rgba(0,0,0,.14);
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --fab:58px;--bn:60px;--safe:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}

/* ── APP SHELL ── */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── TOP BAR ── */
.tb{height:52px;flex-shrink:0;background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;padding-top:env(safe-area-inset-top,0)}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px}
.logo em{color:var(--g);font-style:normal}
.tbs{flex:1}
.hbg{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--tx2);border-radius:6px}
.hbg:active{background:var(--bg)}

/* ── SYNC CHIP ── */
.sc{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--bd);cursor:pointer;color:var(--tx2);background:var(--sf);white-space:nowrap}
.sc.synced{color:var(--gdk);border-color:#9FE1CB;background:var(--gbg)}
.sc.syncing{color:var(--amdk);border-color:#FAC775;background:var(--ambg)}
.sc.err{color:var(--rd);border-color:#F7C1C1;background:var(--rdbg)}
.sc.nosync{color:var(--tx3)}
.scd{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.sc.syncing .scd{animation:bl 1s ease-in-out infinite}

/* ── USER CHIP ── */
.uc{display:flex;align-items:center;gap:6px;padding:3px 9px 3px 4px;border:1px solid var(--bd);border-radius:20px;cursor:pointer;font-size:12px;background:var(--sf);position:relative}
.uc:active{background:var(--bg)}
.av{width:24px;height:24px;border-radius:50%;background:var(--g);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.um{display:none;position:absolute;top:38px;right:0;background:var(--sf);border:1px solid var(--bd2);border-radius:var(--r);min-width:210px;z-index:400;box-shadow:var(--shlg);overflow:hidden}
.um.open{display:block}
.umh{padding:11px 14px;font-size:11px;color:var(--tx2);border-bottom:1px solid var(--bd)}
.umh strong{display:block;font-size:13px;color:var(--tx);margin-bottom:1px}
.umi{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--tx)}
.umi:active{background:var(--bg)}
.umi svg{width:13px;height:13px;color:var(--tx2);flex-shrink:0}
.umi.danger{color:var(--rd)}
.udiv{height:1px;background:var(--bd)}

/* ── BODY LAYOUT ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:216px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform .22s ease}
.nsec{padding:14px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--tx3)}
.ni{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 6px;border-radius:var(--rsm);font-size:13px;cursor:pointer;color:var(--tx2);transition:background .1s,color .1s;user-select:none}
.ni:active{background:var(--bg)}
.ni.active{background:var(--gbg);color:var(--gdk);font-weight:600}
.ni svg{width:15px;height:15px;flex-shrink:0}
.npill{margin-left:auto;font-size:10px;background:var(--s2);border-radius:10px;padding:1px 7px;color:var(--tx3)}
.sbsp{flex:1}

/* ── STORAGE PANEL (sidebar) ── */
.stp{margin:8px;border:1px solid var(--bd);border-radius:var(--rsm);padding:10px 12px;background:var(--bg)}
.stph{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px;font-weight:600}
.stph svg{width:14px;height:14px}
.stpd{font-size:11px;color:var(--tx3)}
.stpp{font-size:11px;color:var(--bl);margin-top:2px;word-break:break-all}
.stpc{margin-top:8px;width:100%;font-size:11px;padding:5px;background:var(--sf);border:1px solid var(--bd);border-radius:4px;cursor:pointer;color:var(--tx2);font-family:var(--font)}
.stpc:active{background:var(--s2)}
.dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dotg{background:var(--g)}
.dotx{background:var(--bd2)}
.sbov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.sbov.show{display:block}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;padding-bottom:calc(var(--fab) + 32px);-webkit-overflow-scrolling:touch}

/* ── BOTTOM NAV ── */
.bnn{display:none;flex-shrink:0;background:var(--sf);border-top:1px solid var(--bd)}
.bni2{display:flex;height:var(--bn)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:500;padding:6px 4px;border:none;background:none;font-family:var(--font)}
.bni.active{color:var(--gdk)}
.bni svg{width:22px;height:22px}

/* ── VERSION BAR ── */
.vbar{height:26px;flex-shrink:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;color:var(--tx3)}
.vb{background:var(--gbg);color:var(--gdk);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-right:6px}

/* ── FAB ── */
.fw{position:fixed;right:18px;bottom:calc(18px + var(--safe));z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab{width:var(--fab);height:var(--fab);background:var(--g);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(29,158,117,.42);font-size:28px;line-height:1;transition:transform .15s,background .15s}
.fab:active{transform:scale(.92)}
.fab.open{background:#1a1917;transform:rotate(45deg)}
.fm{display:flex;flex-direction:column;gap:9px;align-items:flex-end;animation:fmin .16s ease forwards}
@keyframes fmin{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fo{display:flex;align-items:center;gap:10px;cursor:pointer}
.fl{background:var(--sf);color:var(--tx);font-size:13px;font-weight:500;padding:7px 13px;border-radius:20px;border:1px solid var(--bd);box-shadow:0 2px 8px rgba(0,0,0,.08);white-space:nowrap}
.fi3{width:44px;height:44px;border-radius:50%;background:var(--sf);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:20px;flex-shrink:0}

/* ── PAGE ELEMENTS ── */
.ph{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.pt{font-size:20px;font-weight:700;letter-spacing:-.4px}
.ps{font-size:12px;color:var(--tx2);margin-top:2px}
.phs{flex:1;min-width:0}
.pa{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--bd2);background:var(--sf);color:var(--tx);font-size:13px;padding:8px 14px;border-radius:var(--rsm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:600;white-space:nowrap;-webkit-appearance:none}
.btn:active{background:var(--bg)}
.btn.p{background:var(--g);color:#fff;border-color:var(--g)}
.btn.p:active{background:var(--gdk)}
.btn.sm{font-size:12px;padding:5px 10px}
.btn:disabled{opacity:.4;pointer-events:none}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px}
.slbl{font-size:10px;color:var(--tx2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sval{font-size:20px;font-weight:700;letter-spacing:-.5px}
.cg{color:var(--g)}.cb{color:var(--bl)}.ca{color:var(--am)}

/* ── CARD ── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.chd{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.ctl{font-size:13px;font-weight:700}
.csp{flex:1}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--tx3);border-bottom:1px solid var(--bd);background:var(--bg);letter-spacing:.5px;text-transform:uppercase}
td{padding:11px 14px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.trc{cursor:pointer}
tr.trc:active td{background:var(--bg)}

/* ── MOBILE CARDS ── */
.xc{display:none;flex-direction:column}
.xcd{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.xcd:last-child{border-bottom:none}
.xcd:active{background:var(--bg)}
.xcth{width:42px;height:42px;border-radius:7px;object-fit:cover;border:1px solid var(--bd);flex-shrink:0}
.xcic{width:42px;height:42px;border-radius:7px;background:var(--bg);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.xcb{flex:1;min-width:0}
.xcn{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.xcm{font-size:12px;color:var(--tx2);margin-top:2px}
.xca{font-size:15px;font-weight:700;flex-shrink:0}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.bop{background:var(--blbg);color:var(--bl)}
.bap{background:var(--gbg);color:var(--gdk)}
.baw{background:var(--ambg);color:var(--amdk)}
.bpa{background:#EAF3DE;color:#3B6D11}
.bcl{background:var(--s2);color:var(--tx2)}

/* ── MISC ── */
.empty{text-align:center;padding:44px 20px;color:var(--tx3);font-size:13px}
.eic{font-size:30px;margin-bottom:10px}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--tx2);cursor:pointer;padding:4px 0;margin-bottom:2px}
.back svg{width:14px;height:14px}
.ib{background:none;border:none;cursor:pointer;padding:6px;border-radius:5px;color:var(--tx2);font-size:15px;line-height:1}
.ib:active{background:var(--bg)}

/* ── QUÉBEC TAX BOX ── */
.txb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.txh{padding:11px 16px;background:var(--gbg);font-size:12px;font-weight:700;color:var(--gdk);border-bottom:1px solid #9FE1CB;display:flex;align-items:center;gap:7px}
.txr{display:flex;justify-content:space-between;padding:8px 16px;font-size:13px;border-bottom:1px solid var(--bd)}
.txr:last-child{border-bottom:none}
.txr.sub{background:var(--bg);font-weight:600}
.txr.tot{background:var(--gbg);font-weight:700;color:var(--gdk)}
.txr.rec{color:var(--tx2)}

/* ── MODALS ── */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.mbg{align-items:center;padding:16px}}
.modal{background:var(--sf);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--bd2);width:100%;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--shlg);overflow:hidden}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:520px}.modal.wide{max-width:700px}}
.mh2{width:36px;height:4px;background:var(--bd2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
@media(min-width:600px){.mh2{display:none}}
.mhd{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0}
.mhd h2{font-size:15px;font-weight:700;flex:1}
.mb{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.mf{padding:12px 18px;padding-bottom:calc(12px + var(--safe));border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
@media(min-width:600px){.mf{padding-bottom:12px}}

/* ── FORM ── */
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:12px;color:var(--tx2);font-weight:600}
.fi2,.fse,.fta{font-size:16px;padding:11px 12px;border:1px solid var(--bd2);border-radius:var(--rsm);background:var(--sf);color:var(--tx);font-family:var(--font);width:100%;-webkit-appearance:none;appearance:none}
.fi2:focus,.fse:focus,.fta:focus{outline:none;border-color:var(--g)}
.fta{resize:vertical;min-height:64px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ckr{display:flex;align-items:center;gap:9px;padding:9px 0}
.ckr input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.ckr label{font-size:13px;color:var(--tx);cursor:pointer;margin:0}

/* ── TAX PREVIEW ── */
.tp{background:var(--bg);border:1px solid var(--bd);border-radius:var(--rsm);padding:10px 13px;font-size:12px}
.tpr{display:flex;justify-content:space-between;padding:3px 0;color:var(--tx2)}
.tpr.bold{font-weight:700;color:var(--tx);padding-top:6px;border-top:1px solid var(--bd);margin-top:3px}
.tpr.rec{color:var(--g)}

/* ── DROP ZONE ── */
.dz{border:2px dashed var(--bd2);border-radius:var(--rsm);padding:22px 16px;text-align:center;cursor:pointer}
.dz:active,.dz.ov{background:var(--bg);border-color:var(--g)}
.dz p{font-size:12px;color:var(--tx2);margin-top:5px}
.dz input{display:none}
.tgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.tw{position:relative}
.tw img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--rsm);border:1px solid var(--bd);display:block}
.tx{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── INFO BOX ── */
.info{border-radius:var(--rsm);padding:11px 13px;font-size:13px;border:1px solid;line-height:1.5}
.info.bl{background:var(--blbg);color:var(--bl);border-color:#B5D4F4}
.info.gn{background:var(--gbg);color:var(--gdk);border-color:#9FE1CB}
.info.am{background:var(--ambg);color:var(--amdk);border-color:#FAC775}

/* ── STORAGE PICKER ── */
.stp2{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sto{border:2px solid var(--bd);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px}
.sto:active,.sto.sel{border-color:var(--g);background:var(--gbg)}
.sico{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.sna{font-size:12px;font-weight:700}
.sde{font-size:10px;color:var(--tx2);line-height:1.3}
.sbdg{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--gbg);color:var(--gdk);font-weight:600}
.sbdg.nd{background:var(--ambg);color:var(--amdk)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--fab) + 52px);right:16px;z-index:999;background:#1a1917;color:#fff;font-size:13px;padding:10px 15px;border-radius:var(--rsm);opacity:0;transition:opacity .22s;pointer-events:none;max-width:300px;line-height:1.4}
.toast.show{opacity:1}

/* ── MOBILE ── */
@media(max-width:700px){
  .sb{position:fixed;top:0;left:0;bottom:0;z-index:250;transform:translateX(-100%);width:260px;padding-top:env(safe-area-inset-top,0);box-shadow:var(--shlg)}
  .sb.open{transform:translateX(0)}
  .hbg{display:flex}
  .sc{display:none}
  .utx{display:none}
  .uca{display:none}
  .bnn{display:flex;flex-direction:column}
  .vbar{display:none}
  .fw{bottom:calc(var(--bn) + var(--safe) + 14px);right:16px}
  .toast{bottom:calc(var(--bn) + var(--safe) + var(--fab) + 22px)}
  .main{padding:14px 12px;padding-bottom:calc(var(--bn) + var(--fab) + 52px + var(--safe))}
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .dt{display:none!important}
  .xc{display:flex}
  .ph{flex-direction:column;gap:10px}
  .phs{display:none}
  .pa{width:100%}
  .pa .btn{flex:1;justify-content:center}
  .pt{font-size:18px}
  .stp2{grid-template-columns:1fr}
}
@media(min-width:701px){.bnn,.hbg{display:none}.sbov{display:none!important}}
@media(max-width:400px){.r2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div class="tb">
    <button class="hbg" onclick="toggleSB()" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <line x1="2" y1="5" x2="18" y2="5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="2" y1="10" x2="18" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="2" y1="15" x2="18" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="logo">RD <em>Expense</em></div>
    <div class="tbs"></div>
    <div class="sc nosync" id="syncChip" onclick="doSync()"><div class="scd"></div><span id="syncLbl">No storage</span></div>
    <div class="uc" id="uChip" onclick="toggleUM()">
      <div class="av" id="uAv">RD</div>
      <span id="uTx" class="utx">RD</span>
      <svg class="uca" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <div class="um" id="uMenu">
        <div class="umh"><strong id="uMN">RD International</strong><span id="uME" style="display:block;font-size:11px;color:var(--tx3)">Québec, Canada</span></div>
        <div class="umi" onclick="openSt()">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><ellipse cx="7" cy="4" rx="5" ry="2"/><path d="M2 4v2c0 1.1 2.24 2 5 2s5-.9 5-2V4"/><path d="M2 8v2c0 1.1 2.24 2 5 2s5-.9 5-2V8"/></svg>
          Storage Settings
        </div>
        <div class="umi" onclick="doSync()">
          <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 7a5 5 0 009.9-1M12 7a5 5 0 01-9.9 1" stroke-linecap="round"/></svg>
          Sync Now
        </div>
        <div class="udiv"></div>
        <div class="umi danger" onclick="clearData()">

<script>
/* ══════════════════════════════════════════════════════
   CFG
   To enable OneDrive sync: paste your Azure App Client ID
   To enable Google Drive sync: paste your Google OAuth Client ID
   See SETUP.md for full step-by-step instructions
══════════════════════════════════════════════════════ */
const CFG = {
  APP_VERSION:    'v1.3.0',
  APP_RELEASED:   'April 2026',
  MSAL_CLIENT_ID: 'YOUR_AZURE_CLIENT_ID',
  MSAL_TENANT:    'common',
  GAPI_CLIENT_ID: 'YOUR_GOOGLE_CLIENT_ID',
};

/* ══════════════════════════════════════════════════════
   QUÉBEC TAX ENGINE
   GST 5% (federal) + QST 9.975% (provincial)
   Meals & Entertainment: only 50% ITC/ITR per CRA/ARQ
══════════════════════════════════════════════════════ */
const TAX = {
  GST: 0.05, QST: 0.09975,
  MEALS: ['Meals'], EXEMPT: [],
  calc(amt, cat, inc) {
    const a = Number(amt)||0, c = cat||'Other';
    const meal = this.MEALS.includes(c), xmt = this.EXEMPT.includes(c);
    if (xmt||a===0) return {sub:a,gst:0,qst:0,tot:a,gR:0,qR:0,xmt:true,meal:false};
    let sub,gst,qst;
    if (inc) { sub=a/(1+this.GST+this.QST); gst=sub*this.GST; qst=sub*this.QST; }
    else { sub=a; gst=a*this.GST; qst=a*this.QST; }
    const rf = meal ? 0.5 : 1;
    return {sub:r2(sub),gst:r2(gst),qst:r2(qst),tot:r2(inc?a:sub+gst+qst),gR:r2(gst*rf),qR:r2(qst*rf),xmt:false,meal};
  },
  sum(exps) {
    const t = {sub:0,gst:0,qst:0,tot:0,gR:0,qR:0};
    exps.forEach(e=>{
      const x=TAX.calc(e.amount,e.category,e.taxIncluded||false);
      t.sub+=x.sub;t.gst+=x.gst;t.qst+=x.qst;t.tot+=x.tot;t.gR+=x.gR;t.qR+=x.qR;
    });
    return {sub:r2(t.sub),gst:r2(t.gst),qst:r2(t.qst),tot:r2(t.tot),gR:r2(t.gR),qR:r2(t.qR)};
  }
};

/* ══════════════════════════════════════════════════════ STATE */
const S = {
  view:'dashboard', rid:null,
  reports:[], expenses:[],
  storage:{provider:null,folder:'RD-Expenses',connected:false,lastSync:null,token:null,folderId:null},
  fabOpen:false, msalApp:null, gTC:null
};

/* ══════════════════════════════════════════════════════ HELPERS */
const r2  = n => Math.round(n*100)/100;
const uid = p => p+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt = n => '$'+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const ftx = n => n===0?'—':fmt(n);
const fd  = d => { if(!d)return'—'; return new Date(d+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'}); };
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $   = id => document.getElementById(id);

function toast(msg,c) {
  const t=$('toast'); t.textContent=msg; t.style.background=c||'#1a1917';
  t.classList.add('show'); clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),3500);
}
function badge(s) {
  const m={Open:'bop',Approved:'bap','Awaiting Payment':'baw',Paid:'bpa',Closed:'bcl'};
  return '<span class="badge '+(m[s]||'bcl')+'">'+esc(s)+'</span>';
}

/* ══════════════════════════════════════════════════════ PERSIST */
function save() {
  try { localStorage.setItem('rdex5',JSON.stringify({reports:S.reports,expenses:S.expenses,storage:S.storage})); } catch(e){}
}
function load() {
  try {
    const d=JSON.parse(localStorage.getItem('rdex5')||'{}');
    if(d.reports)  S.reports  = d.reports;
    if(d.expenses) S.expenses = d.expenses;
    if(d.storage)  Object.assign(S.storage,d.storage);
    S.expenses.forEach(e=>{ if(e.taxIncluded===undefined) e.taxIncluded=false; });
  } catch(e){}
}

/* ══════════════════════════════════════════════════════
   BOOT — opens directly, no login required

}

/* ══════════════════════════════════════════════════════
   ONEDRIVE SYNC — Microsoft Graph REST API v1.0
   Paste your Azure Client ID into CFG.MSAL_CLIENT_ID
   then click "Configure" in the sidebar to connect.
══════════════════════════════════════════════════════ */
async function connectOneDrive() {
  if(CFG.MSAL_CLIENT_ID==='YOUR_AZURE_CLIENT_ID') {
    toast('Paste your Azure Client ID into CFG.MSAL_CLIENT_ID in index.html — see SETUP.md','#BA7517');
    return false;
  }
  try {
    if(!S.msalApp) {
      const {PublicClientApplication} = msal;
      S.msalApp = new PublicClientApplication({
        auth:{clientId:CFG.MSAL_CLIENT_ID,authority:'https://login.microsoftonline.com/'+CFG.MSAL_TENANT,redirectUri:location.href.split('?')[0].split('#')[0]},
        cache:{cacheLocation:'localStorage',storeAuthStateInCookie:true}
      });
      await S.msalApp.initialize();
    }
    const sc=['User.Read','Files.ReadWrite'];
    let resp;
    const accs=S.msalApp.getAllAccounts();
    if(accs.length>0){try{resp=await S.msalApp.acquireTokenSilent({scopes:sc,account:accs[0]});}catch(e){resp=null;}}
    if(!resp) resp=await S.msalApp.loginPopup({scopes:sc,prompt:'select_account'});
    const tr=await S.msalApp.acquireTokenSilent({scopes:sc,account:resp.account||S.msalApp.getAllAccounts()[0]});
    S.storage.token=tr.accessToken; S.storage.provider='onedrive'; S.storage.connected=true;
    save(); updSt();
    toast('OneDrive connected — '+resp.account.username);
    return true;
  } catch(err) {
    toast('OneDrive connection failed: '+(err.message||err),'#A32D2D');
    return false;
  }
}

async function refreshMST() {
  if(!S.msalApp)return;
  try {
    const a=S.msalApp.getAllAccounts(); if(!a.length)return;
    const t=await S.msalApp.acquireTokenSilent({scopes:['User.Read','Files.ReadWrite'],account:a[0]});
    S.storage.token=t.accessToken;
  } catch(e){console.warn('Token refresh skipped',e);}
}

async function syncOD(rid) {
  await refreshMST();
  if(!S.storage.token) throw new Error('OneDrive: no token — click Storage Settings to reconnect.');
  const base='https://graph.microsoft.com/v1.0/me/drive/root';
  const auth={'Authorization':'Bearer '+S.storage.token,'Content-Type':'application/json'};
  const f=S.storage.folder;
  await fetch(base+'/children',{method:'POST',headers:auth,body:JSON.stringify({name:f,folder:{},['@microsoft.graph.conflictBehavior']:'rename'})});
  const snap=JSON.stringify({reports:S.reports,expenses:S.expenses.map(e=>({...e,receipts:(e.receipts||[]).map(r=>r.startsWith('data:')?'[image]':r)})),exportedAt:new Date().toISOString(),version:CFG.APP_VERSION});
  const dr=await fetch(base+':/%2F'+encodeURIComponent(f)+'/data.json:/content',{method:'PUT',headers:{'Authorization':'Bearer '+S.storage.token,'Content-Type':'application/json'},body:snap});
  if(!dr.ok) throw new Error('OneDrive upload failed: HTTP '+dr.status);
  if(rid){
    const rpt=S.reports.find(r=>r.id===rid); if(!rpt)return;
    const exps=S.expenses.filter(e=>e.reportId===rid);
    const rn=rpt.name.replace(/[^a-z0-9]/gi,'_')+'_Receipts';
    await fetch(base+':/%2F'+encodeURIComponent(f)+':/children',{method:'POST',headers:auth,body:JSON.stringify({name:rn,folder:{},['@microsoft.graph.conflictBehavior']:'rename'})});
    for(let i=0;i<exps.length;i++) for(let j=0;j<(exps[i].receipts||[]).length;j++) {
      const src=exps[i].receipts[j];
      if(!src||src.startsWith('pdf::')||!src.startsWith('data:'))continue;
      try {
        const bl=await(await fetch(src)).blob();
        const fn=rpt.name.replace(/[^a-z0-9]/gi,'_')+'_Line'+(i+1)+'_Receipt'+(j+1)+'.jpg';
        await fetch(base+':/%2F'+encodeURIComponent(f)+'%2F'+encodeURIComponent(rn)+'/'+encodeURIComponent(fn)+':/content',{method:'PUT',headers:{'Authorization':'Bearer '+S.storage.token,'Content-Type':bl.type||'image/jpeg'},body:bl});
      } catch(e){console.warn('Receipt upload skipped',e);}
    }
  }
}

/* ══════════════════════════════════════════════════════
   GOOGLE DRIVE SYNC — Drive API v3
   Paste your Google Client ID into CFG.GAPI_CLIENT_ID
   then click "Configure" in the sidebar to connect.
══════════════════════════════════════════════════════ */
function connectGDrive() {
  return new Promise((resolve)=>{
    if(CFG.GAPI_CLIENT_ID==='YOUR_GOOGLE_CLIENT_ID') {
      toast('Paste your Google Client ID into CFG.GAPI_CLIENT_ID in index.html — see SETUP.md','#BA7517');
      resolve(false); return;
    }
    if(typeof google==='undefined'||!google?.accounts?.oauth2) {
      toast('Google Identity Services not loaded — check your internet connection','#A32D2D');
      resolve(false); return;
    }
    S.gTC=google.accounts.oauth2.initTokenClient({
      client_id:CFG.GAPI_CLIENT_ID,
      scope:'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email',
      callback:async tr=>{
        if(tr.error){toast('Google auth error: '+tr.error,'#A32D2D');resolve(false);return;}
        S.storage.token=tr.access_token; S.storage.provider='google'; S.storage.connected=true;
        save(); updSt();
        toast('Google Drive connected');
        resolve(true);
      }
    });
    S.gTC.requestAccessToken({prompt:'consent'});
  });
}

async function ensureGF() {
  const h={'Authorization':'Bearer '+S.storage.token};
  const q=encodeURIComponent("name='"+S.storage.folder+"' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const r=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&fields=files(id)',{headers:h});
  if(!r.ok) throw new Error('Drive search failed: HTTP '+r.status);
  const d=await r.json();
  if(d.files&&d.files.length>0){S.storage.folderId=d.files[0].id;return d.files[0].id;}
  const cr=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{...h,'Content-Type':'application/json'},body:JSON.stringify({name:S.storage.folder,mimeType:'application/vnd.google-apps.folder'})});
  if(!cr.ok) throw new Error('Could not create Drive folder: HTTP '+cr.status);
  const ff=await cr.json(); S.storage.folderId=ff.id; return ff.id;
}

async function syncGD(rid) {
  if(!S.storage.token) throw new Error('Google Drive: no token — click Storage Settings to reconnect.');
  const h={'Authorization':'Bearer '+S.storage.token};
  const fid=S.storage.folderId||await ensureGF();
  const snap=JSON.stringify({reports:S.reports,expenses:S.expenses.map(e=>({...e,receipts:(e.receipts||[]).map(r=>r.startsWith('data:')?'[image]':r)})),exportedAt:new Date().toISOString(),version:CFG.APP_VERSION});
  const eq=encodeURIComponent("name='data.json' and '"+fid+"' in parents and trashed=false");
  const er=await fetch('https://www.googleapis.com/drive/v3/files?q='+eq+'&fields=files(id)',{headers:h});
  const ed=await er.json(); const eid=ed.files?.[0]?.id;
  const fm=new FormData();
  fm.append('metadata',new Blob([JSON.stringify(eid?{}:{name:'data.json',parents:[fid]})],{type:'application/json'}));
  fm.append('file',new Blob([snap],{type:'application/json'}));
  const up=eid
    ?await fetch('https://www.googleapis.com/upload/drive/v3/files/'+eid+'?uploadType=multipart',{method:'PATCH',headers:h,body:fm})
    :await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:h,body:fm});
  if(!up.ok) throw new Error('Drive upload failed: HTTP '+up.status);
  if(rid){
    const rpt=S.reports.find(r=>r.id===rid); if(!rpt)return;
    const exps=S.expenses.filter(e=>e.reportId===rid);
    const rfn=rpt.name.replace(/[^a-z0-9]/gi,'_')+'_Receipts';
    const rq=encodeURIComponent("name='"+rfn+"' and '"+fid+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
    const rr=await fetch('https://www.googleapis.com/drive/v3/files?q='+rq+'&fields=files(id)',{headers:h});
    const rd=await rr.json(); let rfid=rd.files?.[0]?.id;
    if(!rfid){const rc=await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{...h,'Content-Type':'application/json'},body:JSON.stringify({name:rfn,mimeType:'application/vnd.google-apps.folder',parents:[fid]})});rfid=(await rc.json()).id;}
    for(let i=0;i<exps.length;i++) for(let j=0;j<(exps[i].receipts||[]).length;j++) {
      const src=exps[i].receipts[j];
      if(!src||src.startsWith('pdf::')||!src.startsWith('data:'))continue;
      try {
        const bl=await(await fetch(src)).blob();
        const fn=rpt.name.replace(/[^a-z0-9]/gi,'_')+'_Line'+(i+1)+'_Receipt'+(j+1)+'.jpg';
        const ffm=new FormData();
        ffm.append('metadata',new Blob([JSON.stringify({name:fn,parents:[rfid]})],{type:'application/json'}));
        ffm.append('file',bl);
        await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:h,body:ffm});
      } catch(e){console.warn('Receipt upload skipped',e);}
    }
  }
}

/* ══════════════════════════════════════════════════════ SYNC ORCHESTRATOR */
async function doSync(rid) {
  $('uMenu').classList.remove('open');
  if(!S.storage.connected||!S.storage.token) {
    if(S.storage.provider==='local'){toast('Local mode — use Export on each report','#6b6860');return;}
    toast('Storage not connected — open Storage Settings to connect','#BA7517'); return;
  }
  const c=$('syncChip'),l=$('syncLbl');
  c.className='sc syncing'; l.textContent='Syncing…';
  try {
    if(S.storage.provider==='onedrive') await syncOD(rid);
    if(S.storage.provider==='google')   await syncGD(rid);
    S.storage.lastSync=new Date().toISOString(); save(); updSt();
    toast('Synced to '+{onedrive:'OneDrive',google:'Google Drive'}[S.storage.provider]);
  } catch(err) {
    console.error('Sync error',err);
    c.className='sc err'; l.textContent='Sync error';
    toast('Sync failed — '+(err.message||err),'#A32D2D');
  }
}

/* ══════════════════════════════════════════════════════ STORAGE UI */
function updSt() {
  const st=S.storage, nm={onedrive:'OneDrive',google:'Google Drive',local:'Local'};
  if(!st.provider){
    $('stN').textContent='Storage'; $('stDe').textContent='Not configured';
    $('stPa').style.display='none'; $('stDt').className='dot dotx';
    $('syncChip').className='sc nosync'; $('syncLbl').textContent='No storage'; return;
  }
  $('stN').textContent=nm[st.provider]||'Storage';
  if(st.connected){
    $('stDe').textContent='Connected'+(st.lastSync?' · '+new Date(st.lastSync).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}):'');
    $('stPa').textContent=st.provider==='local'?'Downloads folder':'/'+st.folder;
    $('stPa').style.display='block'; $('stDt').className='dot dotg';
    $('syncChip').className='sc synced'; $('syncLbl').textContent='Synced';
  } else {
    $('stDe').textContent='Not connected'; $('stPa').style.display='none';
    $('stDt').className='dot dotx'; $('syncChip').className='sc nosync'; $('syncLbl').textContent=nm[st.provider];
  }
}

function openSt() {
  $('uMenu').classList.remove('open');
  const st=S.storage, sel=p=>st.provider===p?'sel':'';
  const odRdy=CFG.MSAL_CLIENT_ID!=='YOUR_AZURE_CLIENT_ID';
  const gdRdy=CFG.GAPI_CLIENT_ID!=='YOUR_GOOGLE_CLIENT_ID';

function selProv(p) {
  S.storage.provider=p;
  document.querySelectorAll('.sto').forEach(el=>el.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  $('stFld').style.display=(p&&p!=='local')?'flex':'none';
  $('locInfo').style.display=p==='local'?'block':'none';
  if(p){$('odCfg').style.display=p==='onedrive'?'block':'none';$('gdCfg').style.display=p==='google'?'block':'none';}
  // show/hide connect button
  const cf=$('stFld').nextElementSibling?.nextElementSibling;
}

async function connectSt() {
  S.storage.folder=($('sfF')?.value||'RD-Expenses').trim()||'RD-Expenses';
  closeM();
  if(S.storage.provider==='onedrive') await connectOneDrive();
  else if(S.storage.provider==='google') await connectGDrive();
}

function setLoc() {
  S.storage.provider='local'; S.storage.connected=true; S.storage.token=null;
  save(); updSt(); closeM(); toast('Local storage selected');
}
function discSt() {
  S.storage={provider:null,folder:'RD-Expenses',connected:false,lastSync:null,token:null,folderId:null};
  save(); updSt(); closeM(); toast('Storage disconnected');
}

/* ══════════════════════════════════════════════════════ FAB */
function toggleFab(){S.fabOpen?closeFab():openFab();}
function openFab(){
  S.fabOpen=true; $('fabB').classList.add('open');
  const onDet=S.view==='report-detail'&&S.rid;
  const r=onDet?S.reports.find(r=>r.id===S.rid):null;
  const locked=r&&r.status!=='Open';
  let opts='';
  if(onDet&&!locked) opts+=fo('📋','Add to "'+r.name.slice(0,20)+(r.name.length>20?'…':'')+'"',"mAE('"+r.id+"');closeFab()");
  opts+=fo('📷','Snap receipt','fabSnap()');
  opts+=fo('➕','Add expense','fabAdd()');
  opts+=fo('📁','New report','mNR();closeFab()');
  const m=$('fabM'); m.innerHTML=opts; m.style.display='flex';
}
function closeFab(){S.fabOpen=false;$('fabB').classList.remove('open');$('fabM').style.display='none';}
function fo(ico,lbl,act){return'<div class="fo" onclick="'+act+'"><div class="fl">'+lbl+'</div><div class="fi3">'+ico+'</div></div>';}

function fabSnap(){
  closeFab();
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=e=>{
    if(!e.target.files[0])return;
    const fr=new FileReader();
    fr.onload=ev=>{
      if(!S.reports.filter(r=>r.status==='Open').length){toast('Create a report first!','#BA7517');return;}
      window._snap=ev.target.result; pickR();
    };
    fr.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}
function fabAdd(){
  closeFab();
  const op=S.reports.filter(r=>r.status==='Open');
  if(!op.length){toast('Create a report first','#BA7517');return;}
  if(op.length===1){mAE(op[0].id);return;}
  pickR();
}
function pickR(){
  const op=S.reports.filter(r=>r.status==='Open'), sn=window._snap;
  mR.innerHTML='<div class="mbg" onclick="if(event.target===this){closeM();window._snap=null}">'+
  '<div class="modal"><div class="mh2"></div>'+
  '<div class="mhd"><h2>'+(sn?'📷 Add Snap':'Choose Report')+'</h2><button class="ib" onclick="closeM();window._snap=null">&#10005;</button></div>'+
  '<div class="mb" style="gap:10px">'+
  (sn?'<img src="'+sn+'" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid var(--bd)"/>'  :'')+
  '<p style="font-size:13px;color:var(--tx2)">Which report?</p>'+
  op.map(r=>'<div onclick="closeM();mAE(\''+r.id+'\',window._snap);window._snap=null" style="padding:13px 14px;border:1px solid var(--bd);border-radius:var(--rsm);cursor:pointer;display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-weight:600;font-size:14px">'+esc(r.name)+'</div><div style="font-size:12px;color:var(--tx2)">'+esc(r.category)+'</div></div><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 11l4-4-4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg></div>').join('')+
  '<button class="btn" style="width:100%;justify-content:center" onclick="closeM();window._snap=null;mNR()">+ New Report</button>'+
  '</div></div></div>';
}

function showView(v,id){
  document.querySelectorAll('.ni,.bni').forEach(n=>n.classList.remove('active'));
  const k=v==='report-detail'?'reports':v;
  $('nav-'+k)?.classList.add('active'); $('bn-'+k)?.classList.add('active');
  S.view=v; S.rid=id||null; render();
}
function render(){
  $('navRC').textContent=S.reports.length; $('navEC').textContent=S.expenses.length;
  const m=$('mainC');
  if(S.view==='dashboard')     m.innerHTML=vDash();
  else if(S.view==='reports')  m.innerHTML=vRep();

  else if(S.view==='report-detail') m.innerHTML=vDet(S.rid);
  m.scrollTop=0;
}

        '<td>'+fmt(et.sub)+'</td><td>'+(et.xmt?'&mdash;':fmt(et.gst))+'</td><td>'+(et.xmt?'&mdash;':fmt(et.qst))+'</td>'+
        '<td style="font-weight:600">'+fmt(et.tot)+'</td>'+
        '<td><div style="display:flex;gap:4px">'+(e.receipts?.length?e.receipts.map(rc=>'<img src="'+rc+'" style="width:34px;height:34px;object-fit:cover;border-radius:4px;border:1px solid var(--bd);cursor:pointer" onclick="pRec(\''+rc+'\')" />').join(''):'&mdash;')+'</div></td>'+
        (locked?'':'<td><button class="ib" onclick="delE(\''+e.id+'\')">&#128465;</button></td>')+
      '</tr>';}).join('')+
    '</tbody></table>'+
    '<div class="xc">'+exps.map((e,i)=>{const et=TAX.calc(e.amount,e.category,e.taxIncluded||false);const img=e.receipts?.[0];
      return'<div class="xcd">'+(img?'<img class="xcth" src="'+img+'" onclick="pRec(\''+img+'\')"/>'  :'<div class="xcic">&#128179;</div>')+
      '<div class="xcb"><div class="xcn">'+esc(e.merchant)+'</div><div class="xcm">'+fd(e.date)+' &middot; '+esc(e.category)+'</div>'+
      '<div style="font-size:11px;color:var(--tx2);margin-top:2px">Sub: '+fmt(et.sub)+' &middot; GST: '+(et.xmt?'exempt':fmt(et.gst))+' &middot; QST: '+(et.xmt?'exempt':fmt(et.qst))+(et.meal?' &middot; 50% rule':'')+'</div></div>'+
      '<div style="text-align:right"><div class="xca">'+fmt(et.tot)+'</div>'+(locked?'':'<button class="ib" style="font-size:12px;margin-top:3px" onclick="delE(\''+e.id+'\')">&#128465;</button>')+'</div></div>';}).join('')+'</div>')+
  '</div>'+
  (r.notes?'<div class="card" style="padding:14px 16px"><div style="font-size:11px;color:var(--tx2);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Notes</div><div style="font-size:13px">'+esc(r.notes)+'</div></div>':'');
}

/* ══════════════════════════════════════════════════════ MODALS */
const mR = $('mR');
function closeM(){mR.innerHTML='';}

function mNR(){
  closeFab();
  mR.innerHTML='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="modal"><div class="mh2"></div>'+
  '<div class="mhd"><h2>New Report</h2><button class="ib" onclick="closeM()">&#10005;</button></div>'+
  '<div class="mb">'+
    '<div class="fld"><label>Report Name *</label><input class="fi2" id="rN" placeholder="e.g. Q2 Travel &mdash; Paris Showroom"/></div>'+
    '<div class="fld"><label>Category</label><select class="fse" id="rC"><option>Travel</option><option>Meals &amp; Entertainment</option><option>Office Supplies</option><option>Marketing</option><option>Samples &amp; Showroom</option><option>Shipping &amp; Logistics</option><option>Other</option></select></div>'+
    '<div class="r2"><div class="fld"><label>Start Date</label><input class="fi2" type="date" id="rS"/></div><div class="fld"><label>End Date</label><input class="fi2" type="date" id="rE"/></div></div>'+
    '<div class="fld"><label>Notes</label><textarea class="fta" id="rNt" placeholder="Optional&hellip;"></textarea></div>'+
  '</div>'+
  '<div class="mf"><button class="btn" onclick="closeM()">Cancel</button><button class="btn p" onclick="saveR()">Create</button></div>'+
  '</div></div>';
  setTimeout(()=>$('rN')?.focus(),100);
}

function saveR(){
  const name=$('rN').value.trim(); if(!name){alert('Report name required.');return;}
  const r={id:uid('R'),name,category:$('rC').value,startDate:$('rS').value,endDate:$('rE').value,notes:$('rNt').value.trim(),status:'Open',_ts:Date.now()};
  S.reports.push(r); save(); closeM(); toast('Report created');
  if(S.storage.connected&&S.storage.provider!=='local') doSync();
  showView('report-detail',r.id);
}

function mAE(rid,preImg){
  closeFab(); window._rec=preImg?[preImg]:[];
  mR.innerHTML='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="modal wide"><div class="mh2"></div>'+
  '<div class="mhd"><h2>Add Expense</h2><button class="ib" onclick="closeM()">&#10005;</button></div>'+
  '<div class="mb">'+
    '<div class="r2"><div class="fld"><label>Merchant *</label><input class="fi2" id="eM" placeholder="e.g. Air France" autocomplete="off"/></div><div class="fld"><label>Date *</label><input class="fi2" type="date" id="eD"/></div></div>'+
    '<div class="r2"><div class="fld"><label>Amount (CAD) *</label><input class="fi2" type="number" id="eA" placeholder="0.00" min="0" step="0.01" inputmode="decimal" oninput="updT()"/></div>'+
    '<div class="fld"><label>Category</label><select class="fse" id="eCt" onchange="updT()"><option>Airfare</option><option>Hotel</option><option>Meals</option><option>Ground Transport</option><option>Office Supplies</option><option>Marketing</option><option>Samples</option><option>Shipping</option><option>Other</option></select></div></div>'+
    '<div class="ckr"><input type="checkbox" id="tI" onchange="updT()"/><label for="tI">Amount already includes GST + QST</label></div>'+
    '<div class="tp" id="tPr" style="display:none">'+
      '<div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Qu&eacute;bec Tax Breakdown</div>'+
      '<div class="tpr"><span>Subtotal (pre-tax)</span><span id="tp1">&mdash;</span></div>'+
      '<div class="tpr"><span>GST 5%</span><span id="tp2">&mdash;</span></div>'+
      '<div class="tpr"><span>QST 9.975%</span><span id="tp3">&mdash;</span></div>'+
      '<div class="tpr" id="tpM" style="display:none"><span style="color:var(--am)">&#9888; Meals &mdash; 50% ITC/ITR only</span><span></span></div>'+
      '<div class="tpr bold"><span>Total incl. tax</span><span id="tp4">&mdash;</span></div>'+
      '<div class="tpr rec"><span>GST recoverable (ITC)</span><span id="tp5">&mdash;</span></div>'+
      '<div class="tpr rec"><span>QST recoverable (ITR)</span><span id="tp6">&mdash;</span></div>'+
    '</div>'+
    '<div class="fld"><label>Notes</label><input class="fi2" id="eNo" placeholder="Optional&hellip;"/></div>'+
    '<div class="fld"><label>Receipts</label>'+
      '<div class="dz" id="dz" onclick="$(\'fi4\').click()" ondragover="event.preventDefault();this.classList.add(\'ov\')" ondragleave="this.classList.remove(\'ov\')" ondrop="onDp(event)">'+
        '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" style="display:block;margin:0 auto;color:var(--tx2)"><path d="M12 16V8M12 8l-3 3M12 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.4"/></svg>'+
        '<p>Tap to upload or drag receipt here</p>'+
        '<input type="file" id="fi4" multiple accept="image/*,.pdf" onchange="onFi(this.files)"/>'+
      '</div>'+
      '<div class="tgr" id="tg" style="margin-top:8px"></div>'+
    '</div>'+
  '</div>'+
  '<div class="mf"><button class="btn" onclick="closeM()">Cancel</button><button class="btn p" onclick="saveE(\''+rid+'\')">Add Expense</button></div>'+
  '</div></div>';
  setTimeout(()=>$('eM')?.focus(),100);
  if(preImg) renderT();
}

function updT(){
  const a=parseFloat(($('eA')&&$('eA').value)||'0')||0;
  const c=($('eCt')&&$('eCt').value)||'Other';
  const i=!!($('tI')&&$('tI').checked);
  const p=$('tPr'); if(!p)return;
  if(a<=0){p.style.display='none';return;}
  p.style.display='block';
  const tx=TAX.calc(a,c,i);
  $('tp1').textContent=fmt(tx.sub);
  $('tp2').textContent=tx.xmt?'Exempt':fmt(tx.gst);
  $('tp3').textContent=tx.xmt?'Exempt':fmt(tx.qst);
  $('tp4').textContent=fmt(tx.tot);
  $('tp5').textContent=tx.xmt?'—':fmt(tx.gR);
  $('tp6').textContent=tx.xmt?'—':fmt(tx.qR);
  $('tpM').style.display=tx.meal?'flex':'none';
}

window._rec=[];
function onFi(files){
  Array.from(files).forEach(f=>{
    if(f.type.startsWith('image/')){const fr=new FileReader();fr.onload=ev=>{window._rec.push(ev.target.result);renderT();};fr.readAsDataURL(f);}
    else{window._rec.push('pdf::'+f.name);renderT();}
  });
}
function onDp(ev){ev.preventDefault();$('dz').classList.remove('ov');onFi(ev.dataTransfer.files);}
function renderT(){
  const g=$('tg'); if(!g)return;
  g.innerHTML=window._rec.map((src,i)=>src.startsWith('pdf::')
    ?'<div class="tw"><div style="width:100%;aspect-ratio:1;background:var(--bg);border-radius:6px;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--tx3)">PDF</div><button class="tx" onclick="rmT('+i+')">&#10005;</button></div>'
    :'<div class="tw"><img src="'+src+'"/><button class="tx" onclick="rmT('+i+')">&#10005;</button></div>').join('');
}
function rmT(i){window._rec.splice(i,1);renderT();}

function saveE(rid){
  const m=$('eM').value.trim(),a=$('eA').value,d=$('eD').value;
  if(!m||!a||!d){alert('Merchant, date and amount are required.');return;}
  const e={id:uid('E'),reportId:rid,merchant:m,date:d,amount:parseFloat(a),category:$('eCt').value,notes:$('eNo').value.trim(),taxIncluded:!!($('tI')&&$('tI').checked),receipts:[...window._rec],_ts:Date.now()};
  S.expenses.push(e); save(); closeM(); toast('Expense added');
  if(S.storage.connected&&S.storage.provider!=='local') doSync(rid);
  render();
}
function delE(id){if(!confirm('Remove this expense?'))return;S.expenses=S.expenses.filter(e=>e.id!==id);save();toast('Removed');render();}
function delR(id){if(!confirm('Delete report and all its expenses?'))return;S.reports=S.reports.filter(r=>r.id!==id);S.expenses=S.expenses.filter(e=>e.reportId!==id);save();toast('Deleted');render();}
function advSt(rid,ns){const r=S.reports.find(r=>r.id===rid);if(!r)return;r.status=ns;save();toast('Status → '+ns);if(S.storage.connected&&S.storage.provider!=='local')doSync();render();}
function pRec(src){mR.innerHTML='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="modal"><div class="mh2"></div><div class="mhd"><h2>Receipt</h2><button class="ib" onclick="closeM()">&#10005;</button></div><div style="padding:14px;text-align:center;max-height:80vh;overflow:auto"><img src="'+src+'" style="max-width:100%;border-radius:8px"/></div></div></div>';}

/* ══════════════════════════════════════════════════════
   EXCEL EXPORT — 3 sheets: Expenses, Tax Summary, Summary
══════════════════════════════════════════════════════ */
function expR(rid){
  const r=S.reports.find(r=>r.id===rid); if(!r)return;
  if(typeof XLSX==='undefined'){toast('Export library loading…','#BA7517');return;}
  const exps=S.expenses.filter(e=>e.reportId===rid);
  const fn=r.name.replace(/[^a-z0-9]/gi,'_')+'_Receipts';
  const sp={onedrive:'/'+S.storage.folder+'/'+fn+'/',google:'My Drive/'+S.storage.folder+'/'+fn+'/',local:'Downloads/'+fn+'/'}[S.storage.provider]||'(local)';
  const stx=TAX.sum(exps);
  const wb=XLSX.utils.book_new();

  // Sheet 1: Expenses
  const ws=XLSX.utils.aoa_to_sheet([
    ['RD International — Expense Report · Québec, Canada'],[],
    ['Report',r.name],['Category',r.category],['Period',r.startDate+' to '+r.endDate],
    ['Status',r.status],['App Version',CFG.APP_VERSION],
    ['Jurisdiction','Québec, Canada (GST 5% + QST 9.975%)'],
    [],
    ['#','Date','Merchant','Category','Notes','Amount Entered','Tax Inclusive?','Subtotal','GST (5%)','QST (9.975%)','Total incl. tax','GST Recoverable (ITC)','QST Recoverable (ITR)','Meals 50% rule','Receipt File(s)','Storage Path'],
    ...exps.map((e,i)=>{
      const et=TAX.calc(Number(e.amount),e.category,e.taxIncluded||false);
      return[i+1,e.date,e.merchant,e.category,e.notes||'',Number(e.amount),e.taxIncluded?'Yes':'No',
        et.sub,et.xmt?0:et.gst,et.xmt?0:et.qst,et.tot,et.gR,et.qR,et.meal?'50% only':'Full',
        (e.receipts&&e.receipts.length)?e.receipts.map((_,ri)=>r.name.replace(/[^a-z0-9]/gi,'_')+'_Line'+(i+1)+'_Receipt'+(ri+1)+'.jpg').join(', '):'None',sp];
    }),
    [],[,'','','','','TOTALS','',stx.sub,stx.gst,stx.qst,stx.tot,stx.gR,stx.qR]
  ]);
  ws['!cols']=[{wch:4},{wch:12},{wch:22},{wch:18},{wch:20},{wch:14},{wch:13},{wch:12},{wch:10},{wch:12},{wch:14},{wch:18},{wch:18},{wch:12},{wch:36},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'Expenses');

  // Sheet 2: Tax Summary
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['Québec Tax Summary — GST 5% + QST 9.975%'],[],
    ['Report',r.name],['Status',r.status],[],
    ['ITEM','AMOUNT (CAD)'],
    ['Subtotal (before tax)',stx.sub],
    ['GST — 5% federal',stx.gst],
    ['QST — 9.975% provincial',stx.qst],
    ['Total including taxes',stx.tot],[],
    ['INPUT TAX CREDITS / REFUNDS',''],
    ['GST recoverable (ITC)',stx.gR],
    ['QST recoverable (ITR)',stx.qR],
    ['Total recoverable',r2(stx.gR+stx.qR)],[],
    ['Net cost (after recovery)',r2(stx.tot-stx.gR-stx.qR)],[],
    ['NOTES',''],
    ['Meals & Entertainment','50% ITC/ITR rule per CRA / Revenu Québec (ARQ)'],
    ['GST rate','5% — Revenu Canada (CRA)'],
    ['QST rate','9.975% — Revenu Québec (ARQ)'],
    ['App Version',CFG.APP_VERSION],
    ['Exported',new Date().toLocaleString()]
  ]),'Tax Summary');

  // Sheet 3: Summary
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([
    ['Report Summary'],[],
    ['Report',r.name],['Category',r.category],
    ['Period',r.startDate+' to '+r.endDate],
    ['Status',r.status],['Line Items',exps.length],
    ['Subtotal',stx.sub],['GST',stx.gst],['QST',stx.qst],
    ['Total',stx.tot],['Tax Recoverable',r2(stx.gR+stx.qR)],[],
    ['Storage',{onedrive:'OneDrive',google:'Google Drive',local:'Local'}[S.storage.provider]||'—'],
    ['Receipt Folder',sp],[],
    ['App Version',CFG.APP_VERSION],
    ['Exported',new Date().toLocaleString()]
  ]),'Summary');

  XLSX.writeFile(wb,r.name.replace(/[^a-z0-9]/gi,'_')+'_'+CFG.APP_VERSION+'_Report.xlsx');
  toast('Exported ✓ — 3 sheets: Expenses, Tax Summary, Summary');

  const lines=[];
  exps.forEach((e,i)=>(e.receipts||[]).forEach((src,ri)=>{
    if(!src.startsWith('pdf::')&&src.startsWith('data:'))
      lines.push({src,name:r.name.replace(/[^a-z0-9]/gi,'_')+'_Line'+(i+1)+'_Receipt'+(ri+1)+'.jpg',path:sp});
  }));
  if(lines.length>0) setTimeout(()=>rcptModal(r,lines,fn,sp),500);
  if(S.storage.connected&&S.storage.provider!=='local') doSync(rid);
}

function rcptModal(r,lines,fn,sp){
  const cloud=S.storage.provider&&S.storage.provider!=='local';
  mR.innerHTML='<div class="mbg" onclick="if(event.target===this)closeM()"><div class="modal wide"><div class="mh2"></div>'+
  '<div class="mhd"><h2>Receipt Files</h2><button class="ib" onclick="closeM()">&#10005;</button></div>'+
  '<div class="mb">'+
    '<div class="info '+(cloud?'gn':'bl')+'" style="font-size:12px;line-height:1.6">'+
    (cloud?'Uploading to <strong>'+{onedrive:'OneDrive',google:'Google Drive'}[S.storage.provider]+'</strong> at <code>'+sp+'</code>'
          :'Save into a folder named <strong>'+fn+'</strong> alongside your Excel export.')+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto">'+
    lines.map(l=>'<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:var(--rsm)">'+
      '<img src="'+l.src+'" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--bd);flex-shrink:0"/>'+
      '<div style="flex:1;min-width:0"><div style="font-size:12px;color:var(--tx2);word-break:break-all">'+l.name+'</div><div style="font-size:11px;color:var(--tx3);margin-top:2px">'+l.path+'</div></div>'+
      '<a href="'+l.src+'" download="'+l.name+'" class="btn sm" style="text-decoration:none;flex-shrink:0">Save</a></div>').join('')+
    '</div>'+
  '</div>'+
  '<div class="mf"><button class="btn p" onclick="closeM()">Done</button></div>'+
  '</div></div>';
}

/* ══════════════════════════════════════════════════════ INIT */
boot();
</script>
