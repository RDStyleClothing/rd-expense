<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#ffffff" />
<title>RD Expense</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/msal.js/1.4.18/msal.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f1;--surface:#fff;--surface2:#f0ede8;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1a1917;--text2:#6b6860;--text3:#a09e99;
  --green:#1D9E75;--green-bg:#e1f5ee;--green-dk:#0F6E56;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-dk:#854F0B;
  --red-bg:#FCEBEB;--red:#A32D2D;
  --r:12px;--r-sm:7px;
  --sh:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.05);
  --sh-lg:0 8px 40px rgba(0,0,0,.14);
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --fab:58px;--bn:60px;--safe:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* TOPBAR */
.topbar{height:52px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;padding-top:env(safe-area-inset-top,0)}
.logo{font-size:15px;font-weight:700;letter-spacing:-.4px}
.logo em{color:var(--green);font-style:normal}
.tb-space{flex:1}
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text2);border-radius:6px}
.hamburger:active{background:var(--bg)}

/* SYNC CHIP */
.sync-chip{display:flex;align-items:center;gap:5px;font-size:11px;padding:4px 9px;border-radius:20px;border:1px solid var(--border);cursor:pointer;color:var(--text2);background:var(--surface);white-space:nowrap}
.sync-chip.synced{color:var(--green-dk);border-color:#9FE1CB;background:var(--green-bg)}
.sync-chip.syncing{color:var(--amber-dk);border-color:#FAC775;background:var(--amber-bg)}
.sync-chip.nosync{color:var(--text3)}
.sc-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.syncing .sc-dot{animation:blink 1s ease-in-out infinite}

/* USER CHIP */
.user-chip{display:flex;align-items:center;gap:6px;padding:3px 9px 3px 4px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;background:var(--surface);position:relative}
.user-chip:active{background:var(--bg)}
.avatar{width:24px;height:24px;border-radius:50%;background:var(--green);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-menu{display:none;position:absolute;top:38px;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);min-width:200px;z-index:400;box-shadow:var(--sh-lg);overflow:hidden}
.u-menu.open{display:block}
.u-menu-hdr{padding:11px 14px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}
.u-menu-hdr strong{display:block;font-size:13px;color:var(--text);margin-bottom:1px}
.u-item{display:flex;align-items:center;gap:9px;padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text)}
.u-item:active{background:var(--bg)}
.u-item svg{width:13px;height:13px;color:var(--text2);flex-shrink:0}
.u-item.danger{color:var(--red)}
.u-div{height:1px;background:var(--border)}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:216px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform .22s ease}
.nav-sec{padding:14px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 6px;border-radius:var(--r-sm);font-size:13px;cursor:pointer;color:var(--text2);transition:background .1s,color .1s;user-select:none}
.nav-item:active{background:var(--bg)}
.nav-item.active{background:var(--green-bg);color:var(--green-dk);font-weight:600}
.nav-item svg{width:15px;height:15px;flex-shrink:0}
.nav-pill{margin-left:auto;font-size:10px;background:var(--surface2);border-radius:10px;padding:1px 7px;color:var(--text3)}
.sb-spacer{flex:1}
.st-panel{margin:8px;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;background:var(--bg)}
.st-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:12px;font-weight:600}
.st-head svg{width:14px;height:14px}
.st-detail{font-size:11px;color:var(--text3)}
.st-path{font-size:11px;color:var(--blue);margin-top:2px;word-break:break-all}
.st-cfg{margin-top:8px;width:100%;font-size:11px;padding:5px;background:var(--surface);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text2);font-family:var(--font)}
.st-cfg:active{background:var(--surface2)}
.st-dot{width:7px;height:7px;border-radius:50%;margin-left:auto;flex-shrink:0}
.dot-g{background:var(--green)}
.dot-x{background:var(--border2)}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200}
.sb-overlay.show{display:block}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:18px;padding-bottom:calc(var(--fab) + 32px);-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
.bottom-nav{display:none;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border)}
.bn-inner{display:flex;height:var(--bn)}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;padding:6px 4px;border:none;background:none;font-family:var(--font)}
.bn-item.active{color:var(--green-dk)}
.bn-item svg{width:22px;height:22px}

/* VERSION BAR */
.version-bar{height:26px;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:11px;color:var(--text3)}
.ver-badge{background:var(--green-bg);color:var(--green-dk);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;margin-right:6px}

/* FAB */
.fab-wrap{position:fixed;right:18px;bottom:calc(18px + var(--safe));z-index:150;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.fab{width:var(--fab);height:var(--fab);background:var(--green);color:#fff;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(29,158,117,.42);font-size:28px;line-height:1;transition:transform .15s,background .15s;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.92)}
.fab.open{background:#1a1917;transform:rotate(45deg)}
.fab-menu{display:flex;flex-direction:column;gap:9px;align-items:flex-end;animation:fmIn .16s ease forwards}
@keyframes fmIn{from{opacity:0;transform:scale(.88) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.fab-opt{display:flex;align-items:center;gap:10px;cursor:pointer}
.fab-lbl{background:var(--surface);color:var(--text);font-size:13px;font-weight:500;padding:7px 13px;border-radius:20px;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.08);white-space:nowrap}
.fab-ico{width:44px;height:44px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:20px;flex-shrink:0}

/* LOGIN */
.login-wrap{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--sh)}
.login-brand{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.login-brand em{color:var(--green);font-style:normal}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
.lbl{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:600}
.linput{width:100%;font-size:16px;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:var(--font);margin-bottom:14px;-webkit-appearance:none}
.linput:focus{outline:none;border-color:var(--green)}
.login-err{font-size:12px;color:var(--red);margin-top:-8px;margin-bottom:10px;display:none}
.lbtn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font)}
.lbtn:active{background:var(--green-dk)}
.login-div{display:flex;align-items:center;gap:10px;margin:16px 0}
.login-div span{font-size:11px;color:var(--text3);white-space:nowrap}
.login-div-line{flex:1;height:1px;background:var(--border)}
.ms-btn{width:100%;padding:11px;background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--r-sm);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font)}
.ms-btn:active{background:var(--bg)}
.login-note{margin-top:18px;font-size:11px;color:var(--text3);text-align:center}

/* PAGE */
.page-hdr{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;letter-spacing:-.4px}
.page-sub{font-size:12px;color:var(--text2);margin-top:2px}
.ph-space{flex:1;min-width:0}
.ph-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:13px;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-weight:600;white-space:nowrap;-webkit-appearance:none}
.btn:active{background:var(--bg)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:active{background:var(--green-dk)}
.btn.sm{font-size:12px;padding:5px 10px}
.btn:disabled{opacity:.4;pointer-events:none}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.stat-lbl{font-size:10px;color:var(--text2);margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat-val{font-size:20px;font-weight:700;letter-spacing:-.5px}
.c-g{color:var(--green)}.c-b{color:var(--blue)}.c-a{color:var(--amber)}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.card-title{font-size:13px;font-weight:700}
.card-sp{flex:1}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);background:var(--bg);letter-spacing:.5px;text-transform:uppercase}
td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.tr-c{cursor:pointer}
tr.tr-c:active td{background:var(--bg)}

/* MOBILE CARDS */
.exp-cards{display:none;flex-direction:column}
.exp-card{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;cursor:pointer}
.exp-card:last-child{border-bottom:none}
.exp-card:active{background:var(--bg)}
.ec-thumb{width:42px;height:42px;border-radius:7px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.ec-icon{width:42px;height:42px;border-radius:7px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ec-body{flex:1;min-width:0}
.ec-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ec-meta{font-size:12px;color:var(--text2);margin-top:2px}
.ec-amt{font-size:15px;font-weight:700;flex-shrink:0}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap}
.b-open{background:var(--blue-bg);color:var(--blue)}
.b-approved{background:var(--green-bg);color:var(--green-dk)}
.b-awaiting{background:var(--amber-bg);color:var(--amber-dk)}
.b-paid{background:#EAF3DE;color:#3B6D11}
.b-closed{background:var(--surface2);color:var(--text2)}

.empty{text-align:center;padding:44px 20px;color:var(--text3);font-size:13px}
.empty-ico{font-size:30px;margin-bottom:10px}
.back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text2);cursor:pointer;padding:4px 0;margin-bottom:2px}
.back svg{width:14px;height:14px}
.iBtn{background:none;border:none;cursor:pointer;padding:6px;border-radius:5px;color:var(--text2);font-size:15px;line-height:1}
.iBtn:active{background:var(--bg)}

/* MODALS */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-bg{align-items:center;padding:16px}}
.modal{background:var(--surface);border-radius:var(--r) var(--r) 0 0;border:1px solid var(--border2);width:100%;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:var(--sh-lg);overflow:hidden}
@media(min-width:600px){.modal{border-radius:var(--r);max-width:520px}.modal.wide{max-width:700px}}
.m-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
@media(min-width:600px){.m-handle{display:none}}
.m-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.m-head h2{font-size:15px;font-weight:700;flex:1}
.m-body{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.m-foot{padding:12px 18px;padding-bottom:calc(12px + var(--safe));border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
@media(min-width:600px){.m-foot{padding-bottom:12px}}

/* FORM */
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:var(--text2);font-weight:600}
.finput,.fselect,.ftextarea{font-size:16px;padding:11px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-family:var(--font);width:100%;-webkit-appearance:none;appearance:none}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:var(--green)}
.ftextarea{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}

.drop-zone{border:2px dashed var(--border2);border-radius:var(--r-sm);padding:22px 16px;text-align:center;cursor:pointer}
.drop-zone:active,.drop-zone.over{background:var(--bg);border-color:var(--green)}
.drop-zone p{font-size:12px;color:var(--text2);margin-top:5px}
.drop-zone input{display:none}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px}
.thumb-wrap{position:relative}
.thumb-wrap img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--border);display:block}
.thumb-x{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}

.info{border-radius:var(--r-sm);padding:11px 13px;font-size:13px;border:1px solid;line-height:1.5}
.info.blue{background:var(--blue-bg);color:var(--blue);border-color:#B5D4F4}
.info.green{background:var(--green-bg);color:var(--green-dk);border-color:#9FE1CB}
.info.amber{background:var(--amber-bg);color:var(--amber-dk);border-color:#FAC775}

.st-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.st-opt{border:2px solid var(--border);border-radius:var(--r);padding:14px 10px;text-align:center;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px}
.st-opt:active,.st-opt.sel{border-color:var(--green);background:var(--green-bg)}
.st-opt .si{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.st-opt .sn{font-size:12px;font-weight:700}
.st-opt .sd{font-size:10px;color:var(--text2);line-height:1.3}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--fab) + 52px);right:16px;z-index:999;background:#1a1917;color:#fff;font-size:13px;padding:10px 15px;border-radius:var(--r-sm);opacity:0;transition:opacity .22s;pointer-events:none;max-width:300px;line-height:1.4}
.toast.show{opacity:1}

/* ── MOBILE ─────────────────────────── */
@media(max-width:700px){
  .sidebar{position:fixed;top:0;left:0;bottom:0;z-index:250;transform:translateX(-100%);width:260px;padding-top:env(safe-area-inset-top,0);box-shadow:var(--sh-lg)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex}
  .sync-chip{display:none}
  .u-name-txt{display:none}
  .u-caret{display:none}
  .bottom-nav{display:flex;flex-direction:column}
  .version-bar{display:none}
  .fab-wrap{bottom:calc(var(--bn) + var(--safe) + 14px);right:16px}
  .toast{bottom:calc(var(--bn) + var(--safe) + var(--fab) + 22px)}
  .main{padding:14px 12px;padding-bottom:calc(var(--bn) + var(--fab) + 52px + var(--safe))}
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .dt{display:none!important}
  .exp-cards{display:flex}
  .page-hdr{flex-direction:column;gap:10px}
  .ph-space{display:none}
  .ph-actions{width:100%}
  .ph-actions .btn{flex:1;justify-content:center}
  .page-title{font-size:18px}
  .st-picker{grid-template-columns:1fr}
}
@media(min-width:701px){.bottom-nav{display:none}.hamburger{display:none}.sb-overlay{display:none!important}}
@media(max-width:400px){.row2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-brand">RD <em>Expense</em></div>
    <div class="login-sub">Personal Expense Tracker</div>
    <label class="lbl">Email</label>
    <input class="linput" id="lEmail" type="email" placeholder="you@example.com" autocomplete="username" inputmode="email"/>
    <label class="lbl">Password</label>
    <input class="linput" id="lPass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="login-err" id="lErr">Incorrect — try password: <strong>demo</strong></div>
    <button class="lbtn" onclick="doLogin()">Sign In</button>
    <div class="login-div"><div class="login-div-line"></div><span>or</span><div class="login-div-line"></div></div>
    <button class="ms-btn" onclick="doMSLogin()">
      <svg width="16" height="16" viewBox="0 0 16 16"><rect x="0" y="0" width="7.5" height="7.5" fill="#F35325"/><rect x="8.5" y="0" width="7.5" height="7.5" fill="#81BC06"/><rect x="0" y="8.5" width="7.5" height="7.5" fill="#05A6F0"/><rect x="8.5" y="8.5" width="7.5" height="7.5" fill="#FFBA08"/></svg>
      Sign in with Microsoft 365
    </button>
    <button class="ms-btn" style="margin-top:8px" onclick="doGoogleLogin()">

        Home
      </button>
      <button class="bn-item" id="bn-reports" onclick="navTo('reports')">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="1" width="14" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="7" x2="14" y2="7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="6" y1="10.5" x2="14" y2="10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="6" y1="14" x2="10" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>

<!-- FAB -->
<div class="fab-wrap" id="fabWrap" style="display:none">
  <div class="fab-menu" id="fabMenu" style="display:none"></div>
  <button class="fab" id="fabBtn" onclick="toggleFab()" aria-label="Quick add">+</button>
</div>

<div id="mRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* CONFIG */
const CFG={APP_VERSION:'v1.1.0',APP_RELEASED:'April 2026',MSAL_CLIENT_ID:'YOUR_AZURE_APP_CLIENT_ID',MSAL_TENANT:'common',GOOGLE_CLIENT_ID:'YOUR_GOOGLE_CLIENT_ID',GOOGLE_API_KEY:'YOUR_GOOGLE_API_KEY'};

/* STATE */
const S={user:null,view:'dashboard',rid:null,reports:[],expenses:[],storage:{provider:null,folder:'RD-Expenses',connected:false,lastSync:null},fabOpen:false};

/* HELPERS */
const uid=p=>p+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fmt=n=>'$'+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const fd=d=>{if(!d)return'—';return new Date(d+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $=id=>document.getElementById(id);

function toast(msg,c){const t=$('toast');t.textContent=msg;t.style.background=c||'#1a1917';t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3000);}

function badge(s){const m={'Open':'b-open','Approved':'b-approved','Awaiting Payment':'b-awaiting','Paid':'b-paid','Closed':'b-closed'};return`<span class="badge ${m[s]||'b-closed'}">${esc(s)}</span>`;}

/* PERSIST */
function save(){try{localStorage.setItem('rdex2',JSON.stringify({reports:S.reports,expenses:S.expenses,storage:S.storage}));}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('rdex2')||'{}');if(d.reports)S.reports=d.reports;if(d.expenses)S.expenses=d.expenses;if(d.storage)S.storage=d.storage;}catch(e){}}

/* AUTH */
function doLogin(){
  const email=$('lEmail').value.trim(),pass=$('lPass').value;
  $('lErr').style.display='none';
  if(!email||pass!=='demo'){$('lErr').style.display='block';return;}
  const name=email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  login({email,name,ini:email.substring(0,2).toUpperCase(),prov:'local'});
}
function doMSLogin(){toast('Microsoft SSO simulated — set MSAL_CLIENT_ID in CFG','#BA7517');login({email:'user@rdinternational.com',name:'RD User',ini:'RD',prov:'ms'});}
function doGoogleLogin(){toast('Google SSO simulated — set GOOGLE_CLIENT_ID in CFG','#BA7517');login({email:'user@gmail.com',name:'Google User',ini:'GU',prov:'goog'});}

function login(u){
  S.user=u;load();
  $('loginWrap').style.display='none';
  $('app').style.display='flex';
  $('fabWrap').style.display='flex';
  $('userAv').textContent=u.ini;$('uNameTxt').textContent=u.name.split(' ')[0];
  $('uMName').textContent=u.name;$('uMEmail').textContent=u.email;
  $('verBadge').textContent=CFG.APP_VERSION;$('verDate').textContent=CFG.APP_RELEASED;
  $('verUser').textContent=u.name+' · '+u.email;
  updSt();showView('dashboard');
}
function doLogout(){save();S.user=null;$('app').style.display='none';$('fabWrap').style.display='none';$('loginWrap').style.display='flex';$('lPass').value='';closeFab();closeM();}
function toggleUM(){$('uMenu').classList.toggle('open');}
document.addEventListener('click',e=>{
  if($('userChip')&&!$('userChip').contains(e.target))$('uMenu').classList.remove('open');
  if(S.fabOpen&&$('fabWrap')&&!$('fabWrap').contains(e.target))closeFab();
});

/* SIDEBAR */
function toggleSB(){$('sidebar').classList.toggle('open');$('sbOv').classList.toggle('show');}
function closeSB(){$('sidebar').classList.remove('open');$('sbOv').classList.remove('show');}
function navTo(v,id){closeSB();showView(v,id);}

/* FAB */
function toggleFab(){S.fabOpen?closeFab():openFab();}
function openFab(){
  S.fabOpen=true;$('fabBtn').classList.add('open');
  const onDet=S.view==='report-detail'&&S.rid;
  const r=onDet?S.reports.find(r=>r.id===S.rid):null;
  const locked=r&&r.status!=='Open';
  let opts='';
  if(onDet&&!locked)opts+=fopt('📋',`Add to "${r.name.length>20?r.name.slice(0,20)+'…':r.name}"`,`mAddExp('${r.id}');closeFab()`);
  opts+=fopt('📷','Snap receipt','fabSnap()');
  opts+=fopt('➕','Add expense','fabAdd()');
  opts+=fopt('📁','New report','mNewReport();closeFab()');
  const m=$('fabMenu');m.innerHTML=opts;m.style.display='flex';
}
function closeFab(){S.fabOpen=false;$('fabBtn').classList.remove('open');$('fabMenu').style.display='none';}
function fopt(ico,lbl,act){return`<div class="fab-opt" onclick="${act}"><div class="fab-lbl">${lbl}</div><div class="fab-ico">${ico}</div></div>`;}

function fabSnap(){
  closeFab();
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=e=>{
    if(!e.target.files[0])return;
    const fr=new FileReader();
    fr.onload=ev=>{
      if(S.reports.filter(r=>r.status==='Open').length===0){toast('Create a report first!','#BA7517');return;}
      window._snap=ev.target.result;pickReport();
    };
    fr.readAsDataURL(e.target.files[0]);
  };
  inp.click();
}
function fabAdd(){
  closeFab();
  const open=S.reports.filter(r=>r.status==='Open');
  if(open.length===0){toast('Create a report first','#BA7517');return;}
  if(open.length===1){mAddExp(open[0].id);return;}
  pickReport();
}
function pickReport(){
  const open=S.reports.filter(r=>r.status==='Open');
  const snap=window._snap;
  $('mRoot').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this){closeM();window._snap=null}">
    <div class="modal">
      <div class="m-handle"></div>
      <div class="m-head"><h2>${snap?'📷 Add Snap':'Choose Report'}</h2><button class="iBtn" onclick="closeM();window._snap=null">✕</button></div>
      <div class="m-body" style="gap:10px">
        ${snap?`<img src="${snap}" style="width:100%;max-height:180px;object-fit:cover;border-radius:8px;border:1px solid var(--border)" />`:''}
        <p style="font-size:13px;color:var(--text2)">Which report?</p>
        ${open.map(r=>`<div onclick="closeM();mAddExp('${r.id}',window._snap);window._snap=null" style="padding:13px 14px;border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;gap:10px" ontouchstart="this.style.background='var(--bg)'" ontouchend="this.style.background=''">
          <div style="flex:1"><div style="font-weight:600;font-size:14px">${esc(r.name)}</div><div style="font-size:12px;color:var(--text2)">${esc(r.category)}</div></div>
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 11l4-4-4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>`).join('')}
        <button class="btn" style="width:100%;justify-content:center" onclick="closeM();window._snap=null;mNewReport()">+ New Report</button>
      </div>
    </div>
  </div>`;
}

/* STORAGE */
function updSt(){
  const st=S.storage;
  if(!st.provider){$('stName').textContent='Storage';$('stDetail').textContent='Not configured';$('stPath').style.display='none';$('stDot').className='st-dot dot-x';$('syncChip').className='sync-chip nosync';$('syncLbl').textContent='No storage';return;}
  const nm={onedrive:'OneDrive',google:'Google Drive',local:'Local'};
  $('stName').textContent=nm[st.provider]||'Storage';
  if(st.connected){
    $('stDetail').textContent='Connected'+(st.lastSync?' · '+new Date(st.lastSync).toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}):'');
    $('stPath').textContent=st.provider==='local'?'Downloads':'/'+st.folder;
    $('stPath').style.display='block';$('stDot').className='st-dot dot-g';
    $('syncChip').className='sync-chip synced';$('syncLbl').textContent='Synced';
  }else{$('stDetail').textContent='Not connected';$('stPath').style.display='none';$('stDot').className='st-dot dot-x';$('syncChip').className='sync-chip nosync';$('syncLbl').textContent=nm[st.provider];}
}
function openStorage(){
  $('uMenu').classList.remove('open');
  const st=S.storage,sel=p=>st.provider===p?'sel':'';
  $('mRoot').innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeM()">
    <div class="modal wide"><div class="m-handle"></div>
      <div class="m-head"><h2>Storage Settings</h2><button class="iBtn" onclick="closeM()">✕</button></div>
      <div class="m-body">
        <div class="info blue" style="font-size:12px">Choose where exports and receipts are saved.</div>
        <div>
          <label style="font-size:12px;color:var(--text2);font-weight:600;display:block;margin-bottom:8px">Provider</label>
          <div class="st-picker">
            <div class="st-opt ${sel('onedrive')}" onclick="selProv('onedrive')"><div class="si" style="background:#E6F1FB"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 15.5c0-1.6.8-3 2-3.8C5.4 10 7.3 8.5 9.5 8.5c.7 0 1.4.1 2 .4C12.4 7.6 13.7 7 15.2 7c2.3 0 4.3 1.8 4.3 4.1 0 .2 0 .4-.05.5.8.5 1.3 1.4 1.3 2.4 0 1.7-1.4 3-3.1 3H5.5C4.1 17 3 16.4 3 15.5z" stroke="#185FA5" stroke-width="1.2" fill="#E6F1FB"/></svg></div><div class="sn">OneDrive</div><div class="sd">Microsoft 365 sync</div></div>
            <div class="st-opt ${sel('google')}" onclick="selProv('google')"><div class="si" style="background:#fef8e7"><svg width="22" height="22" viewBox="0 0 22 22"><path d="M11 1L2.5 16.5h17L11 1z" fill="#FBC02D"/><rect x="1" y="16.5" width="20" height="4" rx="2" fill="#4285F4"/><path d="M8 16.5l3-5 3 5" fill="#34A853"/></svg></div><div class="sn">Google Drive</div><div class="sd">Upload to Drive</div></div>
            <div class="st-opt ${sel('local')}" onclick="selProv('local')"><div class="si" style="background:#F1EFE8"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="4" width="18" height="14" rx="2" stroke="#5F5E5A" stroke-width="1.3"/><path d="M7 18v1a1 1 0 001 1h6a1 1 0 001-1v-1" stroke="#5F5E5A" stroke-width="1.3"/><circle cx="11" cy="13" r="2" stroke="#5F5E5A" stroke-width="1.3"/></svg></div><div class="sn">Local</div><div class="sd">Download to device</div></div>
          </div>
        </div>
        <div id="stFields" style="display:${st.provider&&st.provider!=='local'?'flex':'none'};flex-direction:column;gap:12px">
          <div class="field"><label>Sync Folder Name</label><input class="finput" id="sfFolder" value="${esc(st.folder||'RD-Expenses')}" placeholder="RD-Expenses"/></div>
          <div id="odCfg" style="display:${st.provider==='onedrive'?'block':'none'}"><div class="info blue" style="font-size:12px;line-height:1.6"><strong>Enable OneDrive sync:</strong><br>1. Azure Portal → App Registrations<br>2. Add Files.ReadWrite permission<br>3. Set Redirect URI to your GitHub Pages URL<br>4. Set <code>CFG.MSAL_CLIENT_ID</code></div></div>
          <div id="gdCfg" style="display:${st.provider==='google'?'block':'none'}"><div class="info blue" style="font-size:12px;line-height:1.6"><strong>Enable Google Drive sync:</strong><br>1. Google Cloud Console → Enable Drive API<br>2. Create OAuth 2.0 credentials<br>3. Add GitHub Pages URL as origin<br>4. Set <code>CFG.GOOGLE_CLIENT_ID</code></div></div>
        </div>
        <div id="locInfo" style="display:${st.provider==='local'?'block':'none'}"><div class="info green" style="font-size:12px;line-height:1.6">Files download directly to your device. No setup needed.</div></div>
      </div>
      <div class="m-foot">
        <button class="btn" onclick="closeM()">Cancel</button>
        ${st.connected?`<button class="btn" style="color:var(--red)" onclick="discSt()">Disconnect</button>`:''}
        <button class="btn primary" onclick="saveSt()">${st.connected?'Save':'Connect'}</button>
      </div>
    </div>
  </div>`;
}
function selProv(p){S.storage.provider=p;document.querySelectorAll('.st-opt').forEach(el=>el.classList.remove('sel'));event.currentTarget.classList.add('sel');$('stFields').style.display=(p&&p!=='local')?'flex':'none';$('locInfo').style.display=p==='local'?'block':'none';if(p){$('odCfg').style.display=p==='onedrive'?'block':'none';$('gdCfg').style.display=p==='google'?'block':'none';}}
function saveSt(){if(!S.storage.provider){toast('Select a provider','#BA7517');return;}S.storage.folder=($('sfFolder')?.value||'RD-Expenses').trim()||'RD-Expenses';S.storage.connected=true;S.storage.lastSync=null;save();updSt();closeM();toast('Storage configured: '+{onedrive:'OneDrive',google:'Google Drive',local:'Local'}[S.storage.provider]);if(S.storage.provider!=='local')setTimeout(doSync,500);}
function discSt(){S.storage={provider:null,folder:'RD-Expenses',connected:false,lastSync:null};save();updSt();closeM();toast('Storage disconnected');}
function doSync(){$('uMenu').classList.remove('open');if(!S.storage.connected){toast('Configure storage first','#BA7517');return;}if(S.storage.provider==='local'){toast('Local mode: use Export on each report','#6b6860');return;}$('syncChip').className='sync-chip syncing';$('syncLbl').textContent='Syncing…';toast('Syncing…','#BA7517');setTimeout(()=>{S.storage.lastSync=new Date().toISOString();save();updSt();toast('Synced to '+{onedrive:'OneDrive',google:'Google Drive'}[S.storage.provider]);},1800);}

/* VIEWS */
function showView(v,id){
  document.querySelectorAll('.nav-item,.bn-item').forEach(n=>n.classList.remove('active'));
  const k=v==='report-detail'?'reports':v;
  $('nav-'+k)?.classList.add('active');$('bn-'+k)?.classList.add('active');
  S.view=v;S.rid=id||null;render();
}
function render(){
  $('navRC').textContent=S.reports.length;$('navEC').textContent=S.expenses.length;
  const m=$('mainC');
  if(S.view==='dashboard')m.innerHTML=vDash();
  else if(S.view==='reports')m.innerHTML=vReports();
  else if(S.view==='expenses')m.innerHTML=vExp();
  else if(S.view==='report-detail')m.innerHTML=vDetail(S.rid);
  m.scrollTop=0;
}

/* DASHBOARD */
function vDash(){
  const total=S.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const open=S.reports.filter(r=>r.status==='Open').length;
  const aw=S.reports.filter(r=>r.status==='Awaiting Payment').length;
  const paid=S.expenses.filter(e=>{const r=S.reports.find(r=>r.id===e.reportId);return r&&r.status==='Paid';}).reduce((s,e)=>s+Number(e.amount),0);
  const rec=[...S.reports].sort((a,b)=>b._ts-a._ts).slice(0,6);
  return`<div class="page-hdr"><div><div class="page-title">Dashboard</div><div class="page-sub">Welcome, ${esc(S.user?.name?.split(' ')[0]||'User')}</div></div><div class="ph-space"></div><div class="ph-actions"><button class="btn primary" onclick="mNewReport()">+ New Report</button></div></div>
  <div class="stats"><div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${fmt(total)}</div></div><div class="stat"><div class="stat-lbl">Open</div><div class="stat-val c-b">${open}</div></div><div class="stat"><div class="stat-lbl">Awaiting</div><div class="stat-val c-a">${aw}</div></div><div class="stat"><div class="stat-lbl">Paid</div><div class="stat-val c-g">${fmt(paid)}</div></div></div>
  <div class="card"><div class="card-hdr"><div class="card-title">Recent Reports</div><div class="card-sp"></div><button class="btn sm" onclick="showView('reports')">All →</button></div>
  ${rec.length===0?`<div class="empty"><div class="empty-ico">📋</div>No reports yet — tap "+ New Report" above.</div>`:`
  <table class="dt"><thead><tr><th>Report</th><th>Category</th><th>Lines</th><th>Total</th><th>Status</th></tr></thead><tbody>${rec.map(r=>{const ex=S.expenses.filter(e=>e.reportId===r.id);return`<tr class="tr-c" onclick="showView('report-detail','${r.id}')"><td style="font-weight:600">${esc(r.name)}</td><td style="color:var(--text2)">${esc(r.category)}</td><td>${ex.length}</td><td>${fmt(ex.reduce((s,e)=>s+Number(e.amount),0))}</td><td>${badge(r.status)}</td></tr>`;}).join('')}</tbody></table>
  <div class="exp-cards">${rec.map(r=>{const ex=S.expenses.filter(e=>e.reportId===r.id);return`<div class="exp-card" onclick="showView('report-detail','${r.id}')"><div class="ec-icon">📋</div><div class="ec-body"><div class="ec-name">${esc(r.name)}</div><div class="ec-meta">${esc(r.category)} · ${ex.length} lines · ${badge(r.status)}</div></div><div class="ec-amt">${fmt(ex.reduce((s,e)=>s+Number(e.amount),0))}</div></div>`;}).join('')}</div>`}
  </div>`;
}

/* REPORTS */
function vReports(){
  return`<div class="page-hdr"><div class="page-title">Reports</div><div class="ph-space"></div><div class="ph-actions"><button class="btn primary" onclick="mNewReport()">+ New Report</button></div></div>
  <div class="card">${S.reports.length===0?`<div class="empty"><div class="empty-ico">📁</div>No reports yet.</div>`:`
  <table class="dt"><thead><tr><th>Name</th><th>Category</th><th>Period</th><th>Lines</th><th>Total</th><th>Status</th><th></th></tr></thead>
  <tbody>${S.reports.map(r=>{const ex=S.expenses.filter(e=>e.reportId===r.id);return`<tr><td><span style="font-weight:600;cursor:pointer;color:var(--blue)" onclick="showView('report-detail','${r.id}')">${esc(r.name)}</span></td><td style="color:var(--text2)">${esc(r.category)}</td><td style="font-size:12px;color:var(--text2)">${fd(r.startDate)}–${fd(r.endDate)}</td><td>${ex.length}</td><td>${fmt(ex.reduce((s,e)=>s+Number(e.amount),0))}</td><td>${badge(r.status)}</td><td><div style="display:flex;gap:4px"><button class="iBtn" onclick="expReport('${r.id}')">⬇</button><button class="iBtn" onclick="delReport('${r.id}')">🗑</button></div></td></tr>`;}).join('')}</tbody></table>
  <div class="exp-cards">${S.reports.map(r=>{const ex=S.expenses.filter(e=>e.reportId===r.id);return`<div class="exp-card" onclick="showView('report-detail','${r.id}')"><div class="ec-icon">📋</div><div class="ec-body"><div class="ec-name">${esc(r.name)}</div><div class="ec-meta">${esc(r.category)} · ${badge(r.status)}</div></div><div style="text-align:right"><div class="ec-amt">${fmt(ex.reduce((s,e)=>s+Number(e.amount),0))}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${ex.length} lines</div></div></div>`;}).join('')}</div>`}
  </div>`;
}

/* ALL EXPENSES */
function vExp(){
  return`<div class="page-hdr"><div class="page-title">All Expenses</div></div>
  <div class="card">${S.expenses.length===0?`<div class="empty"><div class="empty-ico">💳</div>No expenses yet.</div>`:`
  <table class="dt"><thead><tr><th>Date</th><th>Merchant</th><th>Category</th><th>Amount</th><th>Report</th><th>Receipt</th></tr></thead>
  <tbody>${S.expenses.map(e=>{const r=S.reports.find(r=>r.id===e.reportId);return`<tr><td>${fd(e.date)}</td><td style="font-weight:600">${esc(e.merchant)}</td><td style="color:var(--text2)">${esc(e.category)}</td><td>${fmt(e.amount)}</td><td><span style="cursor:pointer;color:var(--blue)" onclick="showView('report-detail','${e.reportId}')">${r?esc(r.name):'—'}</span></td><td>${e.receipts?.length?`<img src="${e.receipts[0]}" style="width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer" onclick="prevReceipt('${e.receipts[0]}')" />`:'<span style="color:var(--text3)">—</span>'}</td></tr>`;}).join('')}</tbody></table>
  <div class="exp-cards">${S.expenses.map(e=>{const r=S.reports.find(r=>r.id===e.reportId);const img=e.receipts?.[0];return`<div class="exp-card">${img?`<img class="ec-thumb" src="${img}" onclick="prevReceipt('${img}')" />`:`<div class="ec-icon">💳</div>`}<div class="ec-body"><div class="ec-name">${esc(e.merchant)}</div><div class="ec-meta">${fd(e.date)} · ${esc(e.category)}${r?` · <span style="color:var(--blue)">${esc(r.name)}</span>`:''}</div></div><div class="ec-amt">${fmt(e.amount)}</div></div>`;}).join('')}</div>`}
  </div>`;
}

/* REPORT DETAIL */
function vDetail(rid){
  const r=S.reports.find(r=>r.id===rid);
  if(!r)return`<div class="empty">Not found.</div>`;
  const exps=S.expenses.filter(e=>e.reportId===rid);
  const total=exps.reduce((s,e)=>s+Number(e.amount),0);
  const locked=r.status!=='Open';
  const flow={'Open':['Close & Approve','Approved'],'Approved':['Mark Awaiting Payment','Awaiting Payment'],'Awaiting Payment':['Mark as Paid','Paid']};
  const ns=flow[r.status];
  return`<div class="back" onclick="showView('reports')"><svg viewBox="0 0 14 14" fill="none"><path d="M9 11L5 7l4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>Reports</div>
  <div class="page-hdr" style="margin-top:6px"><div><div class="page-title">${esc(r.name)}</div><div class="page-sub">${esc(r.category)} · ${fd(r.startDate)} – ${fd(r.endDate)}</div></div><div class="ph-space"></div>
  <div class="ph-actions">${badge(r.status)}${ns?`<button class="btn primary" onclick="advStatus('${r.id}','${ns[1]}')">${ns[0]}</button>`:''}<button class="btn" onclick="expReport('${r.id}')">⬇</button>${!locked?`<button class="btn primary" onclick="mAddExp('${r.id}')">+ Add</button>`:''}</div></div>
  <div class="stats" style="grid-template-columns:repeat(3,minmax(0,1fr))"><div class="stat"><div class="stat-lbl">Total</div><div class="stat-val">${fmt(total)}</div></div><div class="stat"><div class="stat-lbl">Lines</div><div class="stat-val c-b">${exps.length}</div></div><div class="stat"><div class="stat-lbl">Receipts</div><div class="stat-val c-g">${exps.reduce((s,e)=>s+(e.receipts?.length||0),0)}</div></div></div>
  <div class="card"><div class="card-hdr"><div class="card-title">Expense Lines</div></div>
  ${exps.length===0?`<div class="empty">${locked?'No expenses on this report.':'Tap "+ Add" or the green ＋ button to add an expense.'}</div>`:`
  <table class="dt"><thead><tr><th>#</th><th>Date</th><th>Merchant</th><th>Category</th><th>Notes</th><th>Amount</th><th>Receipts</th>${!locked?'<th></th>':''}</tr></thead>
  <tbody>${exps.map((e,i)=>`<tr><td style="color:var(--text3)">${i+1}</td><td>${fd(e.date)}</td><td style="font-weight:600">${esc(e.merchant)}</td><td style="color:var(--text2)">${esc(e.category)}</td><td style="color:var(--text2);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.notes||'—')}</td><td style="font-weight:600">${fmt(e.amount)}</td><td><div style="display:flex;gap:4px">${e.receipts?.length?e.receipts.map(rc=>`<img src="${rc}" style="width:34px;height:34px;object-fit:cover;border-radius:4px;border:1px solid var(--border);cursor:pointer" onclick="prevReceipt('${rc}')" />`).join(''):'<span style="color:var(--text3);font-size:12px">—</span>'}</div></td>${!locked?`<td><button class="iBtn" onclick="delExp('${e.id}')">🗑</button></td>`:''}</tr>`).join('')}</tbody></table>
  <div class="exp-cards">${exps.map((e,i)=>{const img=e.receipts?.[0];return`<div class="exp-card">${img?`<img class="ec-thumb" src="${img}" onclick="prevReceipt('${img}')" />`:`<div class="ec-icon">💳</div>`}<div class="ec-body"><div class="ec-name">${esc(e.merchant)}</div><div class="ec-meta">${fd(e.date)} · ${esc(e.category)}${e.notes?` · ${esc(e.notes)}`:''}</div></div><div style="text-align:right"><div class="ec-amt">${fmt(e.amount)}</div>${!locked?`<button class="iBtn" style="font-size:12px;margin-top:3px" onclick="delExp('${e.id}')">🗑</button>`:''}</div></div>`;}).join('')}</div>`}
  </div>${r.notes?`<div class="card" style="padding:14px 16px"><div style="font-size:11px;color:var(--text2);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px">Notes</div><div style="font-size:13px">${esc(r.notes)}</div></div>`:''}`;
}

/* MODALS */
const mRoot=$('mRoot');
function closeM(){mRoot.innerHTML='';}

function mNewReport(){
  closeFab();
  mRoot.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal"><div class="m-handle"></div><div class="m-head"><h2>New Report</h2><button class="iBtn" onclick="closeM()">✕</button></div><div class="m-body"><div class="field"><label>Report Name *</label><input class="finput" id="rN" placeholder="e.g. Q2 Travel — Paris" /></div><div class="field"><label>Category</label><select class="fselect" id="rC"><option>Travel</option><option>Meals &amp; Entertainment</option><option>Office Supplies</option><option>Marketing</option><option>Samples &amp; Showroom</option><option>Shipping &amp; Logistics</option><option>Other</option></select></div><div class="row2"><div class="field"><label>Start Date</label><input class="finput" type="date" id="rS" /></div><div class="field"><label>End Date</label><input class="finput" type="date" id="rE" /></div></div><div class="field"><label>Notes</label><textarea class="ftextarea" id="rNt" placeholder="Optional…"></textarea></div></div><div class="m-foot"><button class="btn" onclick="closeM()">Cancel</button><button class="btn primary" onclick="saveReport()">Create</button></div></div></div>`;
  setTimeout(()=>$('rN')?.focus(),100);
}
function saveReport(){
  const name=$('rN').value.trim();if(!name){alert('Report name required.');return;}
  const r={id:uid('R'),name,category:$('rC').value,startDate:$('rS').value,endDate:$('rE').value,notes:$('rNt').value.trim(),status:'Open',createdBy:S.user?.name,_ts:Date.now()};
  S.reports.push(r);save();closeM();toast('Report created');
  if(S.storage.connected&&S.storage.provider!=='local')setTimeout(doSync,600);
  showView('report-detail',r.id);
}

function mAddExp(rid,preImg){
  closeFab();window._rec=preImg?[preImg]:[];
  mRoot.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal wide"><div class="m-handle"></div><div class="m-head"><h2>Add Expense</h2><button class="iBtn" onclick="closeM()">✕</button></div><div class="m-body"><div class="row2"><div class="field"><label>Merchant *</label><input class="finput" id="eM" placeholder="e.g. Air France" autocomplete="off" /></div><div class="field"><label>Date *</label><input class="finput" type="date" id="eD" /></div></div><div class="row2"><div class="field"><label>Amount (CAD) *</label><input class="finput" type="number" id="eA" placeholder="0.00" min="0" step="0.01" inputmode="decimal" /></div><div class="field"><label>Category</label><select class="fselect" id="eCt"><option>Airfare</option><option>Hotel</option><option>Meals</option><option>Ground Transport</option><option>Office Supplies</option><option>Marketing</option><option>Samples</option><option>Shipping</option><option>Other</option></select></div></div><div class="field"><label>Notes</label><input class="finput" id="eNo" placeholder="Optional…" /></div><div class="field"><label>Receipts</label><div class="drop-zone" id="dz" onclick="$('fi').click()" ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')" ondrop="onDrop(event)"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" style="display:block;margin:0 auto;color:var(--text2)"><path d="M12 16V8M12 8l-3 3M12 8l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><rect x="3" y="3" width="18" height="18" rx="3" stroke="currentColor" stroke-width="1.4"/></svg><p>Tap to upload or drag receipt</p><input type="file" id="fi" multiple accept="image/*,.pdf" onchange="onFiles(this.files)" /></div><div class="thumb-grid" id="tg" style="margin-top:8px"></div></div></div><div class="m-foot"><button class="btn" onclick="closeM()">Cancel</button><button class="btn primary" onclick="saveExp('${rid}')">Add Expense</button></div></div></div>`;
  setTimeout(()=>$('eM')?.focus(),100);
  if(preImg)renderThumbs();
}

window._rec=[];
function onFiles(files){Array.from(files).forEach(f=>{if(f.type.startsWith('image/')){const fr=new FileReader();fr.onload=ev=>{window._rec.push(ev.target.result);renderThumbs();};fr.readAsDataURL(f);}else{window._rec.push('pdf::'+f.name);renderThumbs();}});}
function onDrop(ev){ev.preventDefault();$('dz').classList.remove('over');onFiles(ev.dataTransfer.files);}
function renderThumbs(){const g=$('tg');if(!g)return;g.innerHTML=window._rec.map((src,i)=>src.startsWith('pdf::')?`<div class="thumb-wrap"><div style="width:100%;aspect-ratio:1;background:var(--bg);border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3)">PDF</div><button class="thumb-x" onclick="rmT(${i})">✕</button></div>`:`<div class="thumb-wrap"><img src="${src}" /><button class="thumb-x" onclick="rmT(${i})">✕</button></div>`).join('');}
function rmT(i){window._rec.splice(i,1);renderThumbs();}

function saveExp(rid){
  const merchant=$('eM').value.trim(),amount=$('eA').value,date=$('eD').value;
  if(!merchant||!amount||!date){alert('Merchant, date and amount required.');return;}
  const e={id:uid('E'),reportId:rid,merchant,date,amount:parseFloat(amount),category:$('eCt').value,notes:$('eNo').value.trim(),receipts:[...window._rec],_ts:Date.now()};
  S.expenses.push(e);save();closeM();toast('Expense added');
  if(S.storage.connected&&S.storage.provider!=='local')setTimeout(doSync,600);render();
}
function delExp(id){if(!confirm('Remove this expense?'))return;S.expenses=S.expenses.filter(e=>e.id!==id);save();toast('Removed');render();}
function delReport(id){if(!confirm('Delete report and all expenses?'))return;S.reports=S.reports.filter(r=>r.id!==id);S.expenses=S.expenses.filter(e=>e.reportId!==id);save();toast('Deleted');render();}
function advStatus(rid,ns){const r=S.reports.find(r=>r.id===rid);if(!r)return;r.status=ns;save();toast('Status → '+ns);if(S.storage.connected&&S.storage.provider!=='local')setTimeout(doSync,600);render();}

function prevReceipt(src){mRoot.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal"><div class="m-handle"></div><div class="m-head"><h2>Receipt</h2><button class="iBtn" onclick="closeM()">✕</button></div><div style="padding:14px;text-align:center;max-height:80vh;overflow:auto"><img src="${src}" style="max-width:100%;border-radius:8px" /></div></div></div>`;}

/* EXPORT */
function expReport(rid){
  const r=S.reports.find(r=>r.id===rid);if(!r)return;
  if(typeof XLSX==='undefined'){toast('Export library loading…','#BA7517');return;}
  const exps=S.expenses.filter(e=>e.reportId===rid);
  const fn=r.name.replace(/[^a-z0-9]/gi,'_')+'_Receipts';
  const sp={onedrive:`/${S.storage.folder}/${fn}/`,google:`My Drive/${S.storage.folder}/${fn}/`,local:'Downloads/'+fn+'/'}[S.storage.provider]||'(storage not configured)';
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([['RD International — Expense Report'],[`Report:`,r.name],[`Category:`,r.category],[`Period:`,`${r.startDate} to ${r.endDate}`],[`Status:`,r.status],[`Exported by:`,S.user?.name||'—'],[`Storage:`,{onedrive:'OneDrive',google:'Google Drive',local:'Local'}[S.storage.provider]||'—'],[`Version:`,CFG.APP_VERSION],[],['#','Date','Merchant','Category','Notes','Amount (CAD)','Receipt Files','Storage Path'],...exps.map((e,i)=>[i+1,e.date,e.merchant,e.category,e.notes||'',Number(e.amount),e.receipts?.length?e.receipts.map((_,ri)=>`${r.name.replace(/[^a-z0-9]/gi,'_')}_Line${i+1}_Receipt${ri+1}.jpg`).join(', '):'None',sp]),[],[,'','','','','Total',exps.reduce((s,e)=>s+Number(e.amount),0)]]);
  ws['!cols']=[{wch:4},{wch:12},{wch:22},{wch:18},{wch:24},{wch:14},{wch:38},{wch:36}];
  XLSX.utils.book_append_sheet(wb,ws,'Expenses');
  const ws2=XLSX.utils.aoa_to_sheet([['Summary'],[],['Report',r.name],['Category',r.category],['Period',`${r.startDate} to ${r.endDate}`],['Status',r.status],['Lines',exps.length],['Total (CAD)',exps.reduce((s,e)=>s+Number(e.amount),0)],[],['Storage',{onedrive:'OneDrive',google:'Google Drive',local:'Local'}[S.storage.provider]||'—'],['Receipt Folder',sp],['File Naming','{ReportName}_Line{N}_Receipt{N}.jpg'],[],['App Version',CFG.APP_VERSION],['Exported',new Date().toLocaleString()]]);
  ws2['!cols']=[{wch:22},{wch:46}];
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');
  XLSX.writeFile(wb,`${r.name.replace(/[^a-z0-9]/gi,'_')}_${CFG.APP_VERSION}_Report.xlsx`);
  toast('Exported ✓');
  const lines=[];exps.forEach((e,i)=>e.receipts?.forEach((src,ri)=>{if(!src.startsWith('pdf::'))lines.push({src,name:`${r.name.replace(/[^a-z0-9]/gi,'_')}_Line${i+1}_Receipt${ri+1}.jpg`,path:sp});}));
  if(lines.length>0)setTimeout(()=>showRcptModal(r,lines,fn,sp),500);
  if(S.storage.connected&&S.storage.provider!=='local')setTimeout(doSync,1000);
}
function showRcptModal(r,lines,fn,sp){
  const cloud=S.storage.provider&&S.storage.provider!=='local';
  mRoot.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeM()"><div class="modal wide"><div class="m-handle"></div><div class="m-head"><h2>Receipt Files</h2><button class="iBtn" onclick="closeM()">✕</button></div><div class="m-body"><div class="info ${cloud?'green':'blue'}" style="font-size:12px;line-height:1.6">${cloud?`Syncing to <strong>${{onedrive:'OneDrive',google:'Google Drive'}[S.storage.provider]}</strong> at <code>${sp}</code>`:`Save into folder <strong>${fn}</strong> alongside your Excel export.`}</div><div style="display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto">${lines.map(l=>`<div style="display:flex;align-items:center;gap:12px;padding:10px;background:var(--bg);border-radius:var(--r-sm)"><img src="${l.src}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--border);flex-shrink:0" /><div style="flex:1;min-width:0"><div style="font-size:12px;color:var(--text2);word-break:break-all">${l.name}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${l.path}</div></div><a href="${l.src}" download="${l.name}" class="btn sm" style="text-decoration:none;flex-shrink:0">Save</a></div>`).join('')}</div></div><div class="m-foot"><button class="btn primary" onclick="closeM()">Done</button></div></div></div>`;
}

/* INIT */
updSt();
</script>
</body>
</html>
